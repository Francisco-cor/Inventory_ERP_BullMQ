name: inventory-erp

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  erp-internal:
    driver: bridge

# ─── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pg-productos-data:
  pg-ordenes-data:
  pg-stock-data:
  pg-obs-data:
  redis-data:

services:

  # ── postgres-productos ──────────────────────────────────────────────────────
  postgres-productos:
    image: postgres:16-alpine
    container_name: postgres-productos
    restart: unless-stopped
    environment:
      POSTGRES_DB:       productos_db
      POSTGRES_USER:     productos_user
      POSTGRES_PASSWORD: productos_pass
    volumes:
      - pg-productos-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productos_user -d productos_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── postgres-ordenes ────────────────────────────────────────────────────────
  postgres-ordenes:
    image: postgres:16-alpine
    container_name: postgres-ordenes
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ordenes_db
      POSTGRES_USER:     ordenes_user
      POSTGRES_PASSWORD: ordenes_pass
    volumes:
      - pg-ordenes-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordenes_user -d ordenes_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── postgres-stock ──────────────────────────────────────────────────────────
  postgres-stock:
    image: postgres:16-alpine
    container_name: postgres-stock
    restart: unless-stopped
    environment:
      POSTGRES_DB:       stock_db
      POSTGRES_USER:     stock_user
      POSTGRES_PASSWORD: stock_pass
    volumes:
      - pg-stock-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_user -d stock_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── svc-productos ───────────────────────────────────────────────────────────
  svc-productos:
    build:
      context: .
      dockerfile: services/svc-productos/Dockerfile
    container_name: svc-productos
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         3001
      DATABASE_URL: postgres://productos_user:productos_pass@postgres-productos:5432/productos_db
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      LOG_LEVEL:    info
    depends_on:
      postgres-productos:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── svc-ordenes ─────────────────────────────────────────────────────────────
  svc-ordenes:
    build:
      context: .
      dockerfile: services/svc-ordenes/Dockerfile
    container_name: svc-ordenes
    restart: unless-stopped
    environment:
      NODE_ENV:     production
      PORT:         3002
      DATABASE_URL: postgres://ordenes_user:ordenes_pass@postgres-ordenes:5432/ordenes_db
      REDIS_HOST:   redis
      REDIS_PORT:   6379
      LOG_LEVEL:    info
    depends_on:
      postgres-ordenes:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── svc-stock ───────────────────────────────────────────────────────────────
  svc-stock:
    build:
      context: .
      dockerfile: services/svc-stock/Dockerfile
    container_name: svc-stock
    restart: unless-stopped
    environment:
      NODE_ENV:              production
      PORT:                  3003
      DATABASE_URL:          postgres://stock_user:stock_pass@postgres-stock:5432/stock_db
      REDIS_HOST:            redis
      REDIS_PORT:            6379
      LOG_LEVEL:             info
      STOCK_ALERTA_UMBRAL:   10
    depends_on:
      postgres-stock:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── postgres-obs ────────────────────────────────────────────────────────────
  postgres-obs:
    image: postgres:16-alpine
    container_name: postgres-obs
    restart: unless-stopped
    environment:
      POSTGRES_DB:       obs_db
      POSTGRES_USER:     obs_user
      POSTGRES_PASSWORD: obs_pass
    volumes:
      - pg-obs-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obs_user -d obs_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── svc-obs ─────────────────────────────────────────────────────────────────
  svc-obs:
    build:
      context: .
      dockerfile: services/svc-obs/Dockerfile
    container_name: svc-obs
    restart: unless-stopped
    environment:
      NODE_ENV:               production
      PORT:                   3004
      DATABASE_URL:           postgres://obs_user:obs_pass@postgres-obs:5432/obs_db
      REDIS_HOST:             redis
      REDIS_PORT:             6379
      LOG_LEVEL:              info
      SLA_THRESHOLD_SECONDS:  60
      SLA_CHECK_INTERVAL_MS:  30000
    depends_on:
      postgres-obs:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── dashboard ────────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: dashboard
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - erp-internal

  # ── nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      svc-productos:
        condition: service_healthy
      svc-ordenes:
        condition: service_healthy
      svc-stock:
        condition: service_healthy
      svc-obs:
        condition: service_healthy
    networks:
      - erp-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health/productos || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

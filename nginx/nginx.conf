events {
  worker_connections 1024;
}

http {
  upstream svc_productos {
    server svc-productos:3001;
  }

  upstream svc_ordenes {
    server svc-ordenes:3002;
  }

  upstream svc_stock {
    server svc-stock:3003;
  }

  # Logging with upstream timing for observability
  log_format upstream_time '$remote_addr - $upstream_addr [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'rt=$request_time uct="$upstream_connect_time" '
                           'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log upstream_time;

  server {
    listen 80;
    server_name _;

    # Add correlation-id header if missing
    set $correlation_id $http_x_correlation_id;
    if ($correlation_id = "") {
      set $correlation_id $request_id;
    }
    add_header X-Correlation-Id $correlation_id always;
    add_header X-Request-Id $request_id always;

    # ── svc-productos ──────────────────────────────────────────────
    location /api/v1/productos {
      proxy_pass         http://svc_productos;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Correlation-Id $correlation_id;
      proxy_read_timeout 30s;
    }

    location /productos/docs {
      proxy_pass http://svc_productos/docs;
      proxy_set_header Host $host;
    }

    # ── svc-ordenes ────────────────────────────────────────────────
    location /api/v1/ordenes {
      proxy_pass         http://svc_ordenes;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Correlation-Id $correlation_id;
      proxy_read_timeout 30s;
    }

    location /ordenes/docs {
      proxy_pass http://svc_ordenes/docs;
      proxy_set_header Host $host;
    }

    # ── svc-stock ──────────────────────────────────────────────────
    location /api/v1/stock {
      proxy_pass         http://svc_stock;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Correlation-Id $correlation_id;
      proxy_read_timeout 30s;
    }

    location /stock/docs {
      proxy_pass http://svc_stock/docs;
      proxy_set_header Host $host;
    }

    # ── Admin / DLQ ───────────────────────────────────────────────
    location /admin/productos {
      proxy_pass         http://svc_productos/admin;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /admin/ordenes {
      proxy_pass         http://svc_ordenes/admin;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    location /admin/stock {
      proxy_pass         http://svc_stock/admin;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
    }

    # ── Health aggregado ───────────────────────────────────────────
    location /health/productos {
      proxy_pass http://svc_productos/health;
    }

    location /health/ordenes {
      proxy_pass http://svc_ordenes/health;
    }

    location /health/stock {
      proxy_pass http://svc_stock/health;
    }
  }
}
